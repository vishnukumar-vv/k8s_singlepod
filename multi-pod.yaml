apiVersion: v1
kind: Pod
metadata:
  name: multi-container-logs
  namespace: pd
spec:
  volumes:
    - name: shared-logs
      emptyDir: {}

  containers:

  # 🔹 Main Container (Generates Logs with Date)
  - name: app-container
    image: alpine:3.18
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
      - while true; do
          echo "Log entry from app $(date)" >> /var/log/app.log;
          sleep 5;
        done
    volumeMounts:
      - name: shared-logs
        mountPath: /var/log

  # 🔹 Sidecar (Reads Logs)
  - name: log-sidecar
    image: alpine:3.18
    imagePullPolicy: IfNotPresent
    command: ["/bin/sh", "-c"]
    args:
      - tail -f /var/log/app.log
    volumeMounts:
      - name: shared-logs
        mountPath: /var/log
